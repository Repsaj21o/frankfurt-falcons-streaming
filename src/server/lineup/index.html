<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Floorball Lineup Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div id="lineup-screen">
        <div class="title" id="line-title">REIHE 1</div>
        
        <div class="field">
            <!-- Stürmer -->
            <div class="row">
                <div class="player-card"><div class="pos-label">LW</div><div id="p-LW" class="name">-</div></div>
                <div class="player-card"><div class="pos-label">RW</div><div id="p-RW" class="name">-</div></div>
            </div>
            <!-- Center -->
            <div class="row">
                <div class="player-card"><div class="pos-label">C</div><div id="p-C" class="name">-</div></div>
            </div>
            <!-- Verteidiger -->
            <div class="row">
                <div class="player-card"><div class="pos-label">LD</div><div id="p-LD" class="name">-</div></div>
                <div class="player-card"><div class="pos-label">RD</div><div id="p-RD" class="name">-</div></div>
            </div>
            <!-- Goalie -->
            <div class="goalie-area">
                <div class="player-card" style="border-color: white;"><div class="pos-label" style="color: white;">G</div><div id="p-G" class="name">-</div></div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
